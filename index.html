<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets TI — CeroCero</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
  header { background: #1a1a0e; color: #d4c49a; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header span { font-size: 12px; color: #888; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e8e8e0; }
  .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat .value { font-size: 28px; font-weight: 700; }
  .stat.pendiente .value { color: #c0392b; }
  .stat.total .value { color: #1a1a0e; }
  .stat.hecho .value { color: #27ae60; }
  .stat.alta .value { color: #e67e22; }
  .filters { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e8e8e0; margin-bottom: 1.2rem; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select { padding: 7px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; background: #fafafa; color: #1a1a1a; outline: none; }
  .filters input { flex: 1; min-width: 180px; }
  .filters input:focus, .filters select:focus { border-color: #1a1a0e; }
  .filters label { font-size: 12px; color: #888; }
  .btn-reset { padding: 7px 14px; background: #1a1a0e; color: #d4c49a; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; }
  .btn-reset:hover { background: #2b2b1a; }
  .tickets-list { display: flex; flex-direction: column; gap: 8px; }
  .ticket { background: #fff; border-radius: 10px; border: 1px solid #e8e8e0; padding: 1rem 1.2rem; display: grid; grid-template-columns: 80px 1fr 140px 100px 90px; gap: 12px; align-items: center; transition: box-shadow 0.15s; }
  .ticket:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .ticket.pendiente-row { border-left: 3px solid #c0392b; }
  .ticket.hecho-row { border-left: 3px solid #27ae60; }
  .fecha { font-size: 12px; color: #888; }
  .nombre { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
  .descripcion { font-size: 13px; color: #555; line-height: 1.4; }
  .depto { font-size: 12px; color: #888; margin-top: 2px; }
  .tipo-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #f0f0ea; color: #555; display: inline-block; }
  .tipo-hardware { background: #fef3e2; color: #a05a00; }
  .tipo-software { background: #e8f0fe; color: #1a56a0; }
  .tipo-accesos { background: #f3e8fe; color: #6a1a9a; }
  .tipo-internet { background: #e8f8f0; color: #0a6640; }
  .tipo-soporte { background: #e8f0fe; color: #1a56a0; }
  .tipo-otro { background: #f0f0ea; color: #555; }
  .prioridad { font-size: 12px; font-weight: 600; }
  .prioridad.alta { color: #c0392b; }
  .prioridad.media { color: #e67e22; }
  .prioridad.baja { color: #27ae60; }
  .estatus { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-align: center; }
  .estatus.hecho { background: #eafaf1; color: #1e8449; }
  .estatus.pendiente { background: #fdedec; color: #c0392b; }
  .empty { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
  .count-bar { font-size: 13px; color: #888; margin-bottom: 0.8rem; }
  .count-bar strong { color: #1a1a1a; }
  .ticket-header { display: grid; grid-template-columns: 80px 1fr 140px 100px 90px; gap: 12px; padding: 0.5rem 1.2rem; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .loading { text-align: center; padding: 3rem; color: #888; }
  .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e0e0d8; border-top-color: #1a1a0e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner { background: #fdedec; border: 1px solid #f5c6cb; color: #c0392b; padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: none; }
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .ticket { grid-template-columns: 1fr; }
    .ticket-header { display: none; }
    .container { padding: 1rem; }
  }
</style>
</head>

<header>

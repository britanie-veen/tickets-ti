<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets TI — CeroCero</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
  header { background: #1a1a0e; color: #d4c49a; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header span { font-size: 12px; color: #888; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e8e8e0; }
  .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat .value { font-size: 28px; font-weight: 700; }
  .stat.pendiente .value { color: #c0392b; }
  .stat.total .value { color: #1a1a0e; }
  .stat.hecho .value { color: #27ae60; }
  .stat.alta .value { color: #e67e22; }
  .filters { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e8e8e0; margin-bottom: 1.2rem; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filters input, .filters select { padding: 7px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 13px; background: #fafafa; color: #1a1a1a; outline: none; }
  .filters input { flex: 1; min-width: 180px; }
  .filters input:focus, .filters select:focus { border-color: #1a1a0e; }
  .filters label { font-size: 12px; color: #888; }
  .btn-reset { padding: 7px 14px; background: #1a1a0e; color: #d4c49a; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; }
  .btn-reset:hover { background: #2b2b1a; }
  .tickets-list { display: flex; flex-direction: column; gap: 8px; }
  .ticket { background: #fff; border-radius: 10px; border: 1px solid #e8e8e0; padding: 1rem 1.2rem; display: grid; grid-template-columns: 80px 1fr 140px 100px 90px; gap: 12px; align-items: center; transition: box-shadow 0.15s; }
  .ticket:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .ticket.pendiente-row { border-left: 3px solid #c0392b; }
  .ticket.hecho-row { border-left: 3px solid #27ae60; }
  .fecha { font-size: 12px; color: #888; }
  .nombre { font-weight: 500; font-size: 14px; margin-bottom: 2px; }
  .descripcion { font-size: 13px; color: #555; line-height: 1.4; }
  .depto { font-size: 12px; color: #888; margin-top: 2px; }
  .tipo-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #f0f0ea; color: #555; display: inline-block; }
  .tipo-hardware { background: #fef3e2; color: #a05a00; }
  .tipo-software { background: #e8f0fe; color: #1a56a0; }
  .tipo-accesos { background: #f3e8fe; color: #6a1a9a; }
  .tipo-internet { background: #e8f8f0; color: #0a6640; }
  .tipo-soporte { background: #e8f0fe; color: #1a56a0; }
  .tipo-otro { background: #f0f0ea; color: #555; }
  .prioridad { font-size: 12px; font-weight: 600; }
  .prioridad.alta { color: #c0392b; }
  .prioridad.media { color: #e67e22; }
  .prioridad.baja { color: #27ae60; }
  .estatus { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; text-align: center; }
  .estatus.hecho { background: #eafaf1; color: #1e8449; }
  .estatus.pendiente { background: #fdedec; color: #c0392b; }
  .empty { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
  .count-bar { font-size: 13px; color: #888; margin-bottom: 0.8rem; }
  .count-bar strong { color: #1a1a1a; }
  .ticket-header { display: grid; grid-template-columns: 80px 1fr 140px 100px 90px; gap: 12px; padding: 0.5rem 1.2rem; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .loading { text-align: center; padding: 3rem; color: #888; }
  .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e0e0d8; border-top-color: #1a1a0e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-banner { background: #fdedec; border: 1px solid #f5c6cb; color: #c0392b; padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: none; }
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .ticket { grid-template-columns: 1fr; }
    .ticket-header { display: none; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>
<header>
  <h1>Tickets TI — CeroCero</h1>
  <span id="last-update">Cargando...</span>
</header>
<div class="container">
  <div class="stats">
    <div class="stat total"><div class="label">Total tickets</div><div class="value" id="stat-total">—</div></div>
    <div class="stat pendiente"><div class="label">Pendientes</div><div class="value" id="stat-pendiente">—</div></div>
    <div class="stat hecho"><div class="label">Resueltos</div><div class="value" id="stat-hecho">—</div></div>
    <div class="stat alta"><div class="label">Prioridad alta</div><div class="value" id="stat-alta">—</div></div>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="Buscar por nombre, descripción..." />
    <div><label>Estatus</label><br>
      <select id="filtro-estatus">
        <option value="">Todos</option>
        <option value="PENDIENTE">Pendiente</option>
        <option value="HECHO">Hecho</option>
      </select></div>
    <div><label>Prioridad</label><br>
      <select id="filtro-prioridad">
        <option value="">Todas</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select></div>
    <div><label>Departamento</label><br><select id="filtro-depto"><option value="">Todos</option></select></div>
    <div><label>Tipo</label><br><select id="filtro-tipo"><option value="">Todos</option></select></div>
    <button class="btn-reset" onclick="resetFiltros()">Limpiar</button>
  </div>
  <div class="error-banner" id="error-banner"></div>
  <div class="count-bar" id="count-bar"></div>
  <div class="ticket-header">
    <span>Fecha</span><span>Ticket</span><span>Tipo</span><span>Prioridad</span><span>Estatus</span>
  </div>
  <div class="tickets-list" id="lista">
    <div class="loading"><div class="loading-spinner"></div><br>Cargando tickets...</div>
  </div>
</div>
<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vStaWNncH6X4Zr7Ku8B7vLlJhHklxoyPGarWKdsEeZYGw0fPld-U3MkkQUrCGAxgpQHlLhqft3iYHpk/pub?output=csv';
let tickets = [];

function normalizaTipo(raw) {
  const r = (raw || '').toLowerCase();
  if (r.includes('hardware')) return 'Hardware';
  if (r.includes('software')) return 'Software';
  if (r.includes('acceso')) return 'Accesos';
  if (r.includes('internet')) return 'Internet';
  if (r.includes('soporte')) return 'Soporte';
  return 'Otro';
}

function normalizaDepto(raw) {
  return (raw || '').trim();
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cols.push(cur); cur = '';
      } else { cur += c; }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

async function loadTickets() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Error al cargar');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sin datos');
    tickets = rows.slice(1).filter(r => r[1] && r[1].trim()).map(r => ({
      fecha: r[0] || '',
      nombre: (r[1] || '').trim(),
      depto: normalizaDepto(r[3]),
      tipo: normalizaTipo(r[4]),
      desc: (r[5] || '').trim(),
      prioridad: (r[6] || 'Media').trim(),
      estatus: ((r[8] || 'PENDIENTE').trim().toUpperCase())
    }));
    const now = new Date();
    document.getElementById('last-update').textContent =
      now.toLocaleString('es-MX', {weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'});
    initFiltros();
    render();
  } catch (e) {
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = 'No se pudo conectar al Google Sheet. Verifica que el archivo esté compartido públicamente.';
    document.getElementById('lista').innerHTML = '<div class="empty">Error al cargar tickets</div>';
  }
}

function tipoClass(tipo) {
  const t = tipo.toLowerCase();
  if (t === 'hardware') return 'tipo-hardware';
  if (t === 'software') return 'tipo-software';
  if (t === 'accesos') return 'tipo-accesos';
  if (t === 'internet') return 'tipo-internet';
  if (t === 'soporte') return 'tipo-soporte';
  return 'tipo-otro';
}

function initFiltros() {
  const deptos = [...new Set(tickets.map(t => t.depto).filter(Boolean))].sort();
  const sel = document.getElementById('filtro-depto');
  sel.innerHTML = '<option value="">Todos</option>';
  deptos.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });
  const tipos = [...new Set(tickets.map(t => t.tipo))].sort();
  const sel2 = document.getElementById('filtro-tipo');
  sel2.innerHTML = '<option value="">Todos</option>';
  tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel2.appendChild(o); });
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const estatus = document.getElementById('filtro-estatus').value;
  const prioridad = document.getElementById('filtro-prioridad').value;
  const depto = document.getElementById('filtro-depto').value;
  const tipo = document.getElementById('filtro-tipo').value;
  const filtrados = tickets.filter(t => {
    if (estatus && t.estatus !== estatus) return false;
    if (prioridad && t.prioridad !== prioridad) return false;
    if (depto && t.depto !== depto) return false;
    if (tipo && t.tipo !== tipo) return false;
    if (search && !t.nombre.toLowerCase().includes(search) &&
        !t.desc.toLowerCase().includes(search) &&
        !t.depto.toLowerCase().includes(search)) return false;
    return true;
  }).slice().reverse();
  document.getElementById('stat-total').textContent = tickets.length;
  document.getElementById('stat-pendiente').textContent = tickets.filter(t => t.estatus === 'PENDIENTE').length;
  document.getElementById('stat-hecho').textContent = tickets.filter(t => t.estatus === 'HECHO').length;
  document.getElementById('stat-alta').textContent = tickets.filter(t => t.prioridad === 'Alta' && t.estatus === 'PENDIENTE').length;
  document.getElementById('count-bar').innerHTML = `Mostrando <strong>${filtrados.length}</strong> de ${tickets.length} tickets`;
  const lista = document.getElementById('lista');
  if (filtrados.length === 0) { lista.innerHTML = '<div class="empty">No hay tickets con esos filtros</div>'; return; }
  lista.innerHTML = filtrados.map(t => `
    <div class="ticket ${t.estatus.toLowerCase()}-row">
      <div class="fecha">${t.fecha}</div>
      <div>
        <div class="nombre">${t.nombre}</div>
        <div class="descripcion">${t.desc}</div>
        <div class="depto">${t.depto}</div>
      </div>
      <div><span class="tipo-badge ${tipoClass(t.tipo)}">${t.tipo}</span></div>
      <div class="prioridad ${t.prioridad.toLowerCase()}">${t.prioridad}</div>
      <div><span class="estatus ${t.estatus.toLowerCase()}">${t.estatus}</span></div>
    </div>
  `).join('');
}

function resetFiltros() {
  document.getElementById('search').value = '';
  document.getElementById('filtro-estatus').value = '';
  document.getElementById('filtro-prioridad').value = '';
  document.getElementById('filtro-depto').value = '';
  document.getElementById('filtro-tipo').value = '';
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filtro-estatus').addEventListener('change', render);
document.getElementById('filtro-prioridad').addEventListener('change', render);
document.getElementById('filtro-depto').addEventListener('change', render);
document.getElementById('filtro-tipo').addEventListener('change', render);

loadTickets();
</script>
</body>
</html>
